<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲序號分享器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2f3640;
            color: #f5f6fa;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
            min-height: 100vh;
        }

        .app-container {
            background: #353b48;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 800px; /* 為了容納兩排，把寬度加大 */
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #00a8ff;
            margin-bottom: 30px;
        }

        .key-list {
            /* 🌟 排版魔法：設定每 20 個換一欄 (Column) */
            display: grid;
            grid-template-rows: repeat(20, auto); 
            grid-auto-flow: column;
            gap: 12px;
            overflow-x: auto; /* 如果序號多到變成 3 欄、4 欄，允許左右滑動 */
            padding-bottom: 10px;
        }

        .key-item {
            display: flex;
            gap: 10px;
            background: #2f3640;
            padding: 10px;
            border-radius: 6px;
            align-items: center;
            border: 1px solid #718093;
            min-width: 250px; /* 確保每一欄有足夠的寬度 */
        }

        .key-item input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #f5f6fa;
            font-size: 16px;
            font-family: monospace;
            outline: none;
            transition: color 0.3s;
        }

        .copy-btn {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: 0.2s;
            color: white;
            background-color: #44bd32;
            white-space: nowrap;
        }
        .copy-btn:hover { background-color: #4cd137; }
        .copy-btn.success { background-color: #e1b12c; }

        /* 手機版自動變回單排往下排，避免畫面擠破 */
        @media (max-width: 600px) {
            .key-list {
                grid-template-rows: auto;
                grid-auto-flow: row;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>🎮 遊戲序號分享器</h2>
        <div id="keyList" class="key-list"></div>
    </div>

    <script src="keys.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const keyList = document.getElementById("keyList");

            // 從電腦讀取「已經複製過的序號」清單
            // 如果是第一次使用，會得到一個空陣列 []
            const usedKeys = JSON.parse(localStorage.getItem('myUsedKeys') || '[]');

            // 檢查 sharedKeys 是否有從 keys.js 成功載入
            if (typeof sharedKeys !== 'undefined') {
                sharedKeys.forEach(key => {
                    if (key.trim() !== "") {
                        addKeyToDOM(key.trim());
                    }
                });
            } else {
                keyList.innerHTML = "<p style='text-align:center; color:#c23616;'>找不到 keys.js 或沒有序號資料</p>";
            }

            function addKeyToDOM(keyText) {
                const keyItem = document.createElement("div");
                keyItem.className = "key-item";

                const keyDisplay = document.createElement("input");
                keyDisplay.type = "text";
                keyDisplay.value = keyText;
                keyDisplay.readOnly = true;

                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "複製";
                
                // 🌟 網頁載入時檢查：這個序號是不是在已經使用的清單裡？
                if (usedKeys.includes(keyText)) {
                    markAsUsed(copyBtn, keyDisplay);
                }
                
                copyBtn.addEventListener("click", () => {
                    navigator.clipboard.writeText(keyText).then(() => {
                        // 點擊複製後改變外觀
                        markAsUsed(copyBtn, keyDisplay);
                        
                        // 將這個序號存入已使用清單，並儲存到電腦裡
                        if (!usedKeys.includes(keyText)) {
                            usedKeys.push(keyText);
                            localStorage.setItem('myUsedKeys', JSON.stringify(usedKeys));
                        }
                    }).catch(err => {
                        console.error('複製失敗:', err);
                        alert("複製失敗！");
                    });
                });

                keyItem.appendChild(keyDisplay);
                keyItem.appendChild(copyBtn);
                keyList.appendChild(keyItem);
            }

            // 負責把序號變成「已使用」外觀的小函數
            function markAsUsed(btn, display) {
                btn.textContent = "已複製";
                btn.classList.add("success");
                display.style.textDecoration = "line-through";
                display.style.color = "#718093";
            }
        });
    </script>

</body>
</html>
