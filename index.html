<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕雲序號</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2f3640;
            color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center; /* 讓整個容器在螢幕正中間 */
            margin: 0;
            height: 100vh; /* 鎖定網頁高度剛好等於螢幕高度 */
            overflow: hidden; /* 🌟 徹底禁止整個網頁出現上下滾動條 */
        }

        .app-container {
            background: #353b48;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            width: 95vw; /* 寬度佔滿螢幕 95% */
            height: 90vh; /* 高度佔滿螢幕 90%，留出邊界 */
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #00a8ff;
            margin-bottom: 20px;
            flex-shrink: 0; /* 確保標題不會因為序號太多而被壓縮 */
        }

        .key-list {
            /* 🌟 動態排版魔法：向下排列，碰到底部自動換到右邊新的一欄 */
            display: flex;
            flex-direction: column;
            flex-wrap: wrap; 
            align-content: flex-start;
            gap: 12px;
            
            height: 100%; /* 自動填滿標題下方的所有剩餘空間 */
            overflow-x: auto; /* 序號很多欄的時候，允許左右滑動 */
            overflow-y: hidden; /* 確保絕對不會上下滑動 */
            padding-bottom: 10px;
        }

        .key-item {
            display: flex;
            gap: 10px;
            background: #2f3640;
            padding: 10px;
            border-radius: 6px;
            align-items: center;
            border: 1px solid #718093;
            width: max-content; /* 讓框框的寬度「剛剛好」包住序號和按鈕 */
        }

        .key-item input {
            width: 155px; /* 🌟 寫死輸入框寬度，按鈕就會直接貼齊 */
            background: transparent;
            border: none;
            color: #f5f6fa;
            font-size: 16px;
            font-family: monospace;
            outline: none;
            transition: color 0.3s;
        }

        .copy-btn {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: 0.2s;
            color: white;
            background-color: #44bd32;
            white-space: nowrap;
        }
        .copy-btn:hover { background-color: #4cd137; }
        .copy-btn.success { background-color: #e1b12c; }

        /* 美化一下底部的左右滾動條，讓它在深色背景更好看 */
        ::-webkit-scrollbar {
            height: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #2f3640;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #718093;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00a8ff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>🎮 遊戲序號分享器</h2>
        <div id="keyList" class="key-list"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const keyList = document.getElementById("keyList");
            const usedKeys = JSON.parse(localStorage.getItem('myUsedKeys') || '[]');
            
            // 🌟 這裡幫你把網址修正為「動態最新版連結」，移除中間的版本號
            const rawGistUrl = "https://gist.githubusercontent.com/AngKuKueh/744a869a1fc16f2f3ce1430549cd5bee/raw/gistfile1.txt"; 

            try {
                const response = await fetch(rawGistUrl);
                if (!response.ok) throw new Error("網路讀取失敗");
                
                const data = await response.text();
                
                // 直接以換行切割，這比 CSV 更穩定
                const sharedKeys = data.split('\n').map(k => k.trim()).filter(k => k !== "");
                
                if(sharedKeys.length === 0) {
                    keyList.innerHTML = "<p style='text-align:center;'>目前沒有可用的序號。</p>";
                    return;
                }

                // 呼叫下方的生成功能
                sharedKeys.forEach(key => addKeyToDOM(key));
                
            } catch (e) {
                console.error(e);
                keyList.innerHTML = `<p style='color:#e84118; text-align:center;'>無法讀取序號，錯誤原因: ${e.message}</p>`;
            }

            // 🌟 補回原本遺失的建立 DOM 物件功能
            function addKeyToDOM(keyText) {
                const keyItem = document.createElement("div");
                keyItem.className = "key-item";

                const keyDisplay = document.createElement("input");
                keyDisplay.type = "text";
                keyDisplay.value = keyText;
                keyDisplay.readOnly = true;

                const copyBtn = document.createElement("button");
                copyBtn.className = "copy-btn";
                copyBtn.textContent = "複製";
                
                // 如果已經複製過，直接變更樣式
                if (usedKeys.includes(keyText)) {
                    markAsUsed(copyBtn, keyDisplay);
                }
                
                // 點擊複製事件
                copyBtn.addEventListener("click", () => {
                    navigator.clipboard.writeText(keyText).then(() => {
                        markAsUsed(copyBtn, keyDisplay);
                        if (!usedKeys.includes(keyText)) {
                            usedKeys.push(keyText);
                            localStorage.setItem('myUsedKeys', JSON.stringify(usedKeys));
                        }
                    }).catch(err => {
                        console.error('複製失敗:', err);
                        alert("複製失敗！");
                    });
                });

                keyItem.appendChild(keyDisplay);
                keyItem.appendChild(copyBtn);
                keyList.appendChild(keyItem);
            }

            // 🌟 補回原本遺失的變更為「已複製」樣式功能
            function markAsUsed(btn, display) {
                btn.textContent = "已複製";
                btn.classList.add("success");
                display.style.textDecoration = "line-through";
                display.style.color = "#718093";
            }
        });
    </script>

</body>
</html>
