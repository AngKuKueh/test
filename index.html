<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>燕雲序號</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2f3640;
            color: #f5f6fa;
            display: flex;
            justify-content: center;
            align-items: center; /* 讓整個容器在螢幕正中間 */
            margin: 0;
            height: 100vh; /* 鎖定網頁高度剛好等於螢幕高度 */
            overflow: hidden; /* 🌟 徹底禁止整個網頁出現上下滾動條 */
        }

        .app-container {
            background: #353b48;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            width: 95vw; /* 寬度佔滿螢幕 95% */
            height: 90vh; /* 高度佔滿螢幕 90%，留出邊界 */
            display: flex;
            flex-direction: column;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #00a8ff;
            margin-bottom: 20px;
            flex-shrink: 0; /* 確保標題不會因為序號太多而被壓縮 */
        }

        .key-list {
            /* 🌟 動態排版魔法：向下排列，碰到底部自動換到右邊新的一欄 */
            display: flex;
            flex-direction: column;
            flex-wrap: wrap; 
            align-content: flex-start;
            gap: 12px;
            
            height: 100%; /* 自動填滿標題下方的所有剩餘空間 */
            overflow-x: auto; /* 序號很多欄的時候，允許左右滑動 */
            overflow-y: hidden; /* 確保絕對不會上下滑動 */
            padding-bottom: 10px;
        }

        .key-item {
            display: flex;
            gap: 10px;
            background: #2f3640;
            padding: 10px;
            border-radius: 6px;
            align-items: center;
            border: 1px solid #718093;
            width: max-content; /* 讓框框的寬度「剛剛好」包住序號和按鈕 */
        }

        .key-item input {
            width: 155px; /* 🌟 寫死輸入框寬度，按鈕就會直接貼齊在紅色標記線的位置 */
            background: transparent;
            border: none;
            color: #f5f6fa;
            font-size: 16px;
            font-family: monospace;
            outline: none;
            transition: color 0.3s;
        }

        .copy-btn {
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: 0.2s;
            color: white;
            background-color: #44bd32;
            white-space: nowrap;
        }
        .copy-btn:hover { background-color: #4cd137; }
        .copy-btn.success { background-color: #e1b12c; }

        /* 美化一下底部的左右滾動條，讓它在深色背景更好看 */
        ::-webkit-scrollbar {
            height: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #2f3640;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #718093;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00a8ff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>🎮 遊戲序號分享器</h2>
        <div id="keyList" class="key-list"></div>
    </div>

    <script src="keys.js"></script>

   <script>
    document.addEventListener("DOMContentLoaded", async () => {
        const keyList = document.getElementById("keyList");
        const usedKeys = JSON.parse(localStorage.getItem('myUsedKeys') || '[]');
        
        // 🌟 把你的 CSV 發佈連結貼在這裡
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQHCgim2otGFZW_y4Sfobmm5xlzTr3p6wUvZugJZrl2KsPjday1ybKae8q-pRwaj8vrDLMevkNlOngu/pub?gid=0&single=true&output=csv";

        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // 將 CSV 解析成陣列
            const lines = data.split('\n');
            const sharedKeys = lines.slice(1).map(line => line.trim()).filter(k => k !== "");

            sharedKeys.forEach(key => addKeyToDOM(key));
        } catch (e) {
            keyList.innerHTML = "<p style='color:red;'>無法讀取序號，請檢查連結設定。</p>";
        }

        // --- 以下 addKeyToDOM 和 markAsUsed 函數內容不變 ---
        // (請保留你原本程式碼中這兩個函數的邏輯)
    });
    </script>

</body>
</html>
